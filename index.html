<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboardy Pro</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Lock / Login Screen -->
    <div id="authScreen">
        <div class="auth-box">
            <h1>📋 Clipboardy Pro</h1>
            <p class="text-muted">Masukkan password rahasia Anda.</p>
            <input type="password" id="passwordInput" class="input-field" placeholder="Password Ruangan" autofocus>
            <button id="loginBtn" class="btn btn-primary">Buka Ruangan</button>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="appScreen" class="hidden">
        
        <!-- Sidebar for Folders -->
        <aside class="sidebar">
            <div class="brand">
                📋 Clipboardy
                <span id="syncIndicator" class="status-dot" title="Live Sync Active"></span>
            </div>
            
            <div class="sidebar-content">
                <div class="section-title">
                    <span>Folders</span>
                    <button id="btnAddFolder" class="add-folder-btn" title="Tambah Folder Baru">+</button>
                </div>
                <ul id="folderList" class="folder-list">
                    <!-- Folders render here via JS -->
                </ul>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header>
                <div class="header-title">
                    <!-- Optional: we can update this via JS but static is fine -->
                </div>
                <div class="header-actions">
                    <div class="search-container">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" placeholder="Cari catatan...">
                    </div>
                    <button id="btnToggleView" class="btn">Lihat Arsip</button>
                    <button id="btnAddNote" class="btn btn-primary">+ Catatan Baru</button>
                    <button id="btnLock" class="btn btn-danger">🔒 Kunci</button>
                </div>
            </header>

            <div class="main-scroll">
                <div id="clipGrid" class="grid">
                    <!-- Cards render here via JS -->
                </div>
                <div id="emptyState" class="empty-state hidden">
                    <div class="empty-state-icon">📝</div>
                    <h3>Belum ada catatan</h3>
                    <p>Klik "+ Catatan Baru" untuk mulai menulis di folder ini.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Folder Creation Modal -->
    <div id="folderModal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Buat Folder Baru</h3>
            <input type="text" id="folderNameInput" class="input-field" placeholder="Nama Folder (cth: Pekerjaan)" autocomplete="off">
            <div class="modal-actions">
                <button id="btnCancelFolder" class="btn">Batal</button>
                <button id="btnSaveFolder" class="btn btn-primary">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast"></div>

    <!-- Scripts -->
    <script type="module" src="app.js"></script>
</body>
</html>
